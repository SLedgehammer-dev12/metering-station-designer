name: Build Windows Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: cmd
        run: |
          pyinstaller --onedir --console --name MeteringStationDesigner --add-data "knowledge;knowledge" --hidden-import=streamlit --hidden-import=plotly --hidden-import=pyaga8 --hidden-import=CoolProp --hidden-import=fluids --hidden-import=thermo --hidden-import=openpyxl --hidden-import=reportlab streamlit_app/app.py

      - name: Verify and Zip
        run: |
          dir dist\MeteringStationDesigner\
          7z a MeteringStationDesigner_Windows.zip .\dist\MeteringStationDesigner\*

      - name: Upload to Release
        run: |
          gh release upload v1.0.0 MeteringStationDesigner_Windows.zip --clobber --repo ${{ github.repository }}
