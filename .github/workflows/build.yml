name: Build Windows Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka ordered-set

      - name: Build with Nuitka
        run: |
          python -m nuitka --standalone --onefile=false --windows-console-mode=disable --enable-plugin=tk-inter --include-package=streamlit --include-package=plotly --include-package=numpy --include-package=pandas --include-package=pyaga8 --include-package=CoolProp --include-package=fluids --include-package=thermo --include-package=openpyxl --include-package=reportlab --include-package=metering_designer --include-package=streamlit_app --include-data-dir=knowledge=knowledge --output-dir=dist --assume-yes-for-downloads --windows-company-name=Metering-Designer --windows-product-name="Metering Station Designer" --windows-file-description="Measurement Station Design Tool" --windows-file-version=1.0.0 --windows-product-version=1.0.0 streamlit_app/app.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeteringDesigner-Windows
          path: dist/app.dist/

      - name: Zip for release
        run: Compress-Archive -Path dist/app.dist/* -DestinationPath MeteringDesigner_v1.0.0_Windows.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: MeteringDesigner_v1.0.0_Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
