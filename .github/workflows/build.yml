name: Build Windows Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onedir --console --name MeteringStationDesigner `
            --add-data "knowledge;knowledge" `
            --hidden-import=streamlit --hidden-import=plotly `
            --hidden-import=pyaga8 --hidden-import=CoolProp `
            --hidden-import=fluids --hidden-import=thermo `
            --hidden-import=openpyxl --hidden-import=reportlab `
            streamlit_app/app.py

      - name: Verify and Zip
        run: |
          echo "Build output:"
          dir dist\MeteringStationDesigner\
          7z a -tzip MeteringStationDesigner_v1.0.0_Windows.zip .\dist\MeteringStationDesigner\*

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: MeteringStationDesigner_v1.0.0_Windows.zip
          tag_name: v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
